<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ppang Clinic - Post-Treatment Care</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --blue:#1D4ED8;--blue-light:#EFF6FF;--blue-mid:#BFDBFE;
    --bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;
    --text:#0F172A;--muted:#64748B;--hint:#94A3B8;
    --warn:#FEF3C7;--warn-b:#F59E0B;
    --r:12px;--rs:8px;
  }
  html{scroll-behavior:smooth;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.75;}

  .hero{background:#fff;border-bottom:1px solid var(--border);padding:36px 24px 28px;text-align:center;}
  .hero-logo{width:72px;height:auto;margin:0 auto 16px;display:block;}
  .hero-clinic{font-family:'Noto Serif',serif;font-size:22px;font-weight:700;letter-spacing:3px;color:var(--text);}
  .hero-sub{font-size:12px;letter-spacing:2px;color:var(--muted);margin-top:4px;text-transform:uppercase;}
  .hero-divider{width:40px;height:1px;background:var(--border);margin:16px auto;}
  .hero-title{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.2px;}
  .hero-title-en{font-size:13px;color:var(--muted);margin-top:4px;}

  .sticky-bar{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
  .top-row{display:flex;align-items:center;gap:8px;padding:12px 16px;flex-wrap:wrap;justify-content:center;}
  .lang-btn{padding:7px 14px;border:1.5px solid var(--border);background:none;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--muted);transition:all .15s;font-weight:500;white-space:nowrap;}
  .lang-btn:hover{background:var(--bg);color:var(--text);}
  .lang-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}

  main{max-width:720px;margin:0 auto;padding:28px 14px 80px;}

  .group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden;transition:box-shadow .2s;}
  .group-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.06);}
  .group-head{padding:18px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
  .group-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
  .group-titles{flex:1;min-width:0;}
  .group-title{font-size:15.5px;font-weight:700;color:var(--text);line-height:1.4;}
  .group-target{font-size:11.5px;color:var(--hint);margin-top:3px;}
  .chevron{color:var(--hint);transition:transform .25s;flex-shrink:0;}
  .group-card.open .chevron{transform:rotate(180deg);}
  .group-body{display:none;padding:0 20px 20px;border-top:1px solid var(--border);}
  .group-card.open .group-body{display:block;}

  .precaution-list{list-style:none;padding:0;margin-top:16px;}
  .precaution-list li{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--bg);font-size:13.5px;line-height:1.75;color:var(--muted);word-break:keep-all;}
  .precaution-list li:last-child{border-bottom:none;}
  .precaution-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:9px;}
  .precaution-list li strong{color:var(--text);font-weight:600;}
  .precaution-list li.crit{background:var(--warn);border-radius:var(--rs);padding:11px 13px;margin-top:2px;border-bottom:none;border-left:3px solid var(--warn-b);}
  .precaution-list li.crit::before{background:var(--warn-b);margin-top:9px;}
  .dtag{display:inline-block;background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:600;padding:1px 7px;border-radius:4px;margin:0 2px;}

  .common-card{background:linear-gradient(135deg,#FEF3C7 0%,#FFF7ED 100%);border:1px solid var(--warn-b);border-radius:var(--r);padding:20px;margin-bottom:14px;}
  .common-card h3{font-size:15px;font-weight:700;color:#92400E;margin-bottom:4px;}

  .lang-block{display:none;}
  .lang-block.active{display:block;}

  footer{text-align:center;padding:20px 16px;font-size:11px;color:var(--hint);border-top:1px solid var(--border);background:var(--surface);line-height:1.8;}

  @media(max-width:480px){
    .hero-clinic{font-size:18px;}
    .hero-title{font-size:15px;}
    .group-title{font-size:14px;}
    .precaution-list li{font-size:13px;}
    main{padding:18px 12px 80px;}
  }
</style>
</head>

let currentLang = 'ko';

function render(lang) {
  const d = DATA[lang];
  document.getElementById('heroTitle').textContent = d.heroTitle;
  document.getElementById('heroTitleEn').textContent = d.heroTitleEn;
  document.getElementById('footerNote').textContent = d.footerNote;

  let html = '';
  d.groups.forEach((g, idx) => {
    let itemsHtml = '';
    g.items.forEach(item => {
      itemsHtml += '<li class="' + (item.crit ? 'crit' : '') + '">' + item.html + '</li>';
    });
    html += '<div class="group-card' + (idx === 0 ? ' open' : '') + '">' +
      '<div class="group-head" onclick="toggleGroup(this)">' +
        '<div class="group-num" style="background:' + g.color + '">' + g.num + '</div>' +
        '<div class="group-titles">' +
          '<div class="group-title">' + g.title + '</div>' +
          '<div class="group-target">' + g.target + '</div>' +
        '</div>' +
        '<svg class="chevron" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>' +
      '</div>' +
      '<div class="group-body"><ul class="precaution-list">' + itemsHtml + '</ul></div>' +
    '</div>';
  });

  let commonHtml = '<li>' + d.commonItems.join('</li><li>') + '</li>';
  html += '<div class="common-card">' +
    '<h3>' + d.commonTitle + '</h3>' +
    '<ul class="precaution-list" style="margin-top:12px;">' + commonHtml + '</ul>' +
  '</div>';

  document.getElementById('mainContent').innerHTML = html;
}

function toggleGroup(header) {
  header.closest('.group-card').classList.toggle('open');
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(currentLang);
  });
});

render('ko');
